repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--target-version, py311]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        files: synphage/
        language_version: python3.11
  - repo: https://github.com/rubik/xenon
    rev: v0.9.0
    hooks:
      - id: xenon
        args:
          - --max-absolute=C
          - --max-modules=C
          - --max-average=A
          - --exclude=synphage/assets/viewer/static_graph.py
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=100
  - repo: local
    hooks:
      - id: check-file-line-count
        name: Check file line count (max 800)
        language: python
        entry: python scripts/check_line_count.py
        types: [python]
