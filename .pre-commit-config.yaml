repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        files: synphage/
        language_version: python3.11
  - repo: https://github.com/rubik/xenon
    rev: v0.9.0
    hooks:
      - id: xenon
        args:
          - --max-absolute=C
          - --max-modules=C
          - --max-average=A
          - --exclude=synphage/assets/viewer/static_graph.py

